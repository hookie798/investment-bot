name: investment-bot-daily-run

on:
  schedule:
    # 🕐 UTC时间 = 北京时间 09:00（工作日）
    - cron: "0 1 * * 1-5"

  workflow_dispatch:   # 手动触发按钮

  push:
    branches:
      - main
    paths:
      - "**.py"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ 创建 logs 目录（防止写文件报错）
      - name: Prepare runtime folders
        run: |
          mkdir -p logs

      # 5️⃣ 运行投资系统（核心）
      - name: Run investment bot
        run: |
          python main.py

      # 6️⃣ 保存 portfolio 状态（可选但推荐）
      - name: Commit portfolio state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add portfolio_state.json logs || true

          git commit -m "chore: update portfolio state" || echo "No changes"

          git push || echo "No changes to push"
